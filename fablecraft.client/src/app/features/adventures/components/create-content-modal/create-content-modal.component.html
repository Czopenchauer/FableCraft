<div (click)="onBackdropClick($event)" *ngIf="isOpen" class="modal-backdrop">
  <div class="modal-container" [class.modal-container--wide]="phase === 'editing'">
    <div class="modal-content">
      <!-- Header -->
      <div class="modal-header">
        <h2>{{ phase === 'input' ? 'Create Content' : 'Review & Edit' }}</h2>
        <button (click)="onClose()" class="close-button" title="Close" type="button">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </button>
      </div>

      <!-- Phase: Input (original form) -->
      <ng-container *ngIf="phase === 'input'">
        <div class="modal-body">
          <!-- Type selector -->
          <div class="type-selector">
            <button
              *ngFor="let t of types"
              (click)="type = t.value"
              [class.active]="type === t.value"
              [disabled]="isSaving"
              class="type-button"
              type="button"
            >
              {{ t.label }}
            </button>
          </div>

          <!-- Direct creation toggle -->
          <div class="direct-toggle">
            <label class="toggle-label">
              <input type="checkbox" [(ngModel)]="isDirect" (ngModelChange)="onDirectToggle()" [disabled]="isSaving">
              <span>Create directly <span class="direct-hint-inline">(no AI generation)</span></span>
            </label>
            <p *ngIf="isDirect && type === 'character'" class="direct-hint">
              Direct creation only supports background characters.
            </p>
          </div>

          <!-- Common fields -->
          <div class="form-group">
            <label class="form-label" for="cc-name">Name</label>
            <input
              id="cc-name"
              [(ngModel)]="name"
              [disabled]="isSaving"
              class="form-input"
              placeholder="e.g. Kira Voss / The Rusty Anchor"
              type="text"
            >
          </div>

          <!-- Type-specific selector -->
          <div *ngIf="type === 'character'" class="form-group">
            <label class="form-label" for="cc-char-importance">Importance</label>
            <select id="cc-char-importance" [(ngModel)]="characterImportance" [disabled]="isSaving || isDirect" class="form-input">
              <option *ngFor="let o of characterImportanceOptions" [value]="o">{{ o }}</option>
            </select>
          </div>

          <div *ngIf="type === 'location'" class="form-group">
            <label class="form-label" for="cc-loc-importance">Importance</label>
            <select id="cc-loc-importance" [(ngModel)]="locationImportance" [disabled]="isSaving" class="form-input">
              <option *ngFor="let o of locationImportanceOptions" [value]="o">{{ o }}</option>
            </select>
          </div>

          <div *ngIf="type === 'item'" class="form-group">
            <label class="form-label" for="cc-power">Power level</label>
            <select id="cc-power" [(ngModel)]="powerLevel" [disabled]="isSaving" class="form-input">
              <option *ngFor="let o of itemPowerLevelOptions" [value]="o">{{ o }}</option>
            </select>
          </div>

          <div *ngIf="type === 'lore'" class="form-group">
            <label class="form-label" for="cc-category">Category</label>
            <select id="cc-category" [(ngModel)]="category" [disabled]="isSaving" class="form-input">
              <option *ngFor="let o of loreCategoryOptions" [value]="o">{{ o }}</option>
            </select>
          </div>

          <!-- Description (direct mode only) -->
          <div *ngIf="isDirect" class="form-group">
            <label class="form-label" for="cc-description">Description</label>
            <textarea
              id="cc-description"
              [(ngModel)]="description"
              [disabled]="isSaving"
              class="form-input"
              placeholder="A short summary of this content."
              rows="3"
            ></textarea>
          </div>

          <!-- Details -->
          <div class="form-group">
            <label class="form-label" for="cc-details">{{ isDirect ? 'Content' : 'Details' }}</label>
            <textarea
              id="cc-details"
              [(ngModel)]="details"
              [disabled]="isSaving"
              class="form-input"
              [placeholder]="isDirect ? 'The full content for this entry.' : 'Describe what this is, its role/purpose, key facts, and any constraints. The crafter expands this into a full profile.'"
              rows="6"
            ></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button (click)="onClose()" [disabled]="isSaving" class="btn-secondary" type="button">Cancel</button>
          <button (click)="isDirect ? submitDirect() : submit()" [disabled]="!isValid || isSaving" class="btn-primary" type="button">
            <span *ngIf="isSaving" class="spinner"></span>
            {{ isSaving ? (isDirect ? 'Creating\u2026' : 'Generating\u2026') : (isDirect ? 'Create' : 'Generate') }}
          </button>
        </div>
      </ng-container>

      <!-- Phase: Editing (raw JSON review) -->
      <ng-container *ngIf="phase === 'editing' || phase === 'confirming'">
        <div class="modal-body">
          <!-- Draft summary -->
          <div *ngIf="draftResult" class="draft-summary">
            <span class="draft-kind">{{ draftResult.kind }}</span>
            <span class="draft-name">{{ draftResult.name }}</span>
            <p class="draft-summary-text">{{ draftResult.summary }}</p>
          </div>

          <!-- JSON editor -->
          <div class="form-group">
            <label class="form-label" for="cc-json">
              Raw JSON
              <span class="form-hint">Edit the generated content below before saving.</span>
            </label>
            <textarea
              id="cc-json"
              [(ngModel)]="editableJson"
              [disabled]="phase === 'confirming'"
              class="json-editor"
              spellcheck="false"
              rows="20"
            ></textarea>
            <p *ngIf="jsonError" class="json-error">{{ jsonError }}</p>
          </div>
        </div>

        <div class="modal-footer">
          <button (click)="backToInput()" [disabled]="phase === 'confirming'" class="btn-secondary" type="button">Back</button>
          <button (click)="confirm()" [disabled]="phase === 'confirming'" class="btn-primary" type="button">
            <span *ngIf="phase === 'confirming'" class="spinner"></span>
            {{ phase === 'confirming' ? 'Saving…' : 'Save' }}
          </button>
        </div>
      </ng-container>
    </div>
  </div>
</div>
