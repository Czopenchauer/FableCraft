<div class="scene-image-container">
  <!-- Main Image Display -->
  <div class="image-display" *ngIf="selectedImage && selectedImage.status === 'Completed'">
    <img
      [src]="imageSrc(selectedImage)"
      [alt]="'Scene image v' + selectedImage.version"
      class="scene-image"
      (click)="toggleGallery()"
    />
    <div class="image-overlay">
      <span class="image-version">v{{ selectedImage.version }}</span>
      <button
        class="btn-gallery"
        (click)="toggleGallery()"
        *ngIf="completedImages.length > 1"
        title="View all versions"
      >
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        {{ completedImages.length }}
      </button>
    </div>
  </div>

  <!-- No Image State -->
  <div class="no-image" *ngIf="!selectedImage || selectedImage.status !== 'Completed'">
    <div class="no-image-content">
      <!-- Generating State -->
      <ng-container *ngIf="isGenerating || (selectedImage && selectedImage.status === 'Generating')">
        <svg class="spinner" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle>
          <path fill="currentColor" class="opacity-75"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="status-text">Generating image...</span>
      </ng-container>

      <!-- Error State -->
      <ng-container *ngIf="error && !isGenerating">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="error-icon">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="error-text">{{ error }}</span>
      </ng-container>

      <!-- Empty State -->
      <ng-container *ngIf="!isGenerating && !error && (!selectedImage || selectedImage.status !== 'Generating')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="empty-icon">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span class="empty-text">No image generated</span>
      </ng-container>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="image-actions">
    <button
      class="btn-generate"
      (click)="generateImage()"
      [disabled]="isGenerating || isLoading"
      title="Generate new image"
    >
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" *ngIf="!isGenerating">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <svg class="spinner-small" fill="none" viewBox="0 0 24 24" *ngIf="isGenerating">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle>
        <path fill="currentColor" class="opacity-75"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span>{{ hasImages ? 'Regenerate' : 'Generate' }}</span>
    </button>
  </div>

  <!-- Image Gallery Modal -->
  <div class="gallery-modal" *ngIf="showGallery" (click)="toggleGallery()">
    <div class="gallery-content" (click)="$event.stopPropagation()">
      <div class="gallery-header">
        <h3>Image Versions</h3>
        <button class="btn-close" (click)="toggleGallery()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="gallery-grid">
        <div
          class="gallery-item"
          *ngFor="let image of completedImages"
          [class.selected]="image.isSelected"
          (click)="selectImage(image)"
        >
          <img [src]="imageSrc(image)" [alt]="'Version ' + image.version"/>
          <div class="gallery-item-info">
            <span class="version-badge">v{{ image.version }}</span>
            <span class="duration" *ngIf="image.generationDurationMs">{{ formatDuration(image.generationDurationMs) }}</span>
            <button
              class="btn-delete-small"
              (click)="deleteImage(image, $event)"
              title="Delete this version"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
          <div class="selected-indicator" *ngIf="image.isSelected">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
