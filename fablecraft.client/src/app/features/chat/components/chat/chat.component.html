<div class="chat-layout">
  <!-- Mobile Sidebar Toggle -->
  <button (click)="toggleMobileSidebar()" class="mobile-sidebar-toggle">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="icon-sm">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
  </button>

  <!-- Sidebar -->
  <div class="chat-sidebar" [class.open]="showMobileSidebar">
    <app-chat-session-list
      [sessions]="sessions"
      [activeSessionId]="activeSessionId"
      [isLoadingSessions]="isLoadingSessions"
      (sessionSelected)="onSessionSelected($event)"
      (sessionDeleted)="onSessionDeleted($event)"
      (sessionCreated)="onSessionCreated($event)"
    ></app-chat-session-list>
  </div>

  <!-- Mobile Overlay -->
  <div *ngIf="showMobileSidebar" class="mobile-overlay" (click)="toggleMobileSidebar()"></div>

  <!-- Main Panel -->
  <div class="chat-main">
    <app-chat-window
      [session]="activeSession"
      (presetChanged)="onPresetChanged($event)"
      (messagesUpdated)="onMessagesUpdated()"
    ></app-chat-window>
  </div>
</div>
