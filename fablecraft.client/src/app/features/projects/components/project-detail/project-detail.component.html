<div class="detail-container" *ngIf="!loading && project">
  <!-- Header -->
  <div class="detail-header">
    <div class="header-top">
      <button (click)="goBack()" class="back-button">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
      </button>
      <div class="header-info">
        <h1 class="project-name">{{ project.name }}</h1>
        <p *ngIf="project.description" class="project-description">{{ project.description }}</p>
      </div>
      <div class="header-actions">
        <div class="index-controls">
          <div *ngIf="indexStatus === 'Indexed'" class="index-badge indexed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <path d="M5 13l4 4L19 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Indexed</span>
          </div>
          <div *ngIf="indexStatus === 'Indexing'" class="index-badge indexing">
            <svg class="index-spinner" viewBox="0 0 24 24" fill="none" width="14" height="14">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="spinner-track"/>
              <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" stroke-linecap="round" class="spinner-arc"/>
            </svg>
            <span>Indexing...</span>
          </div>
          <div *ngIf="indexStatus === 'NeedsReindexing'" class="index-badge needs-reindex">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Needs Re-index</span>
            <span *ngIf="pendingChangesCount > 0" class="pending-count">{{ pendingChangesCount }}</span>
          </div>
          <button
            *ngIf="indexStatus === 'NotIndexed' || indexStatus === 'NeedsReindexing'"
            (click)="startIndexing()"
            class="index-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <path *ngIf="indexStatus === 'NotIndexed'" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z M9 12h6M12 9v6" stroke-width="2" stroke-linecap="round"/>
              <path *ngIf="indexStatus === 'NeedsReindexing'" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>{{ indexStatus === 'NotIndexed' ? 'Index' : 'Re-index' }}</span>
          </button>
        </div>
        <button (click)="onDeleteProject()" class="btn-delete-header" title="Delete project">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="detail-body">
    <!-- Mobile sidebar toggle -->
    <button (click)="toggleMobileSidebar()" class="mobile-sidebar-toggle" *ngIf="!showMobileSidebar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
        <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
      </svg>
    </button>

    <!-- Left Sidebar -->
    <div class="sidebar" [class.mobile-open]="showMobileSidebar">
      <div class="mobile-sidebar-header" *ngIf="showMobileSidebar">
        <button (click)="closeMobileSidebar()" class="mobile-close-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
          </svg>
        </button>
      </div>

      <app-project-file-list
        [files]="project.files"
        [selectedFileId]="selectedFileId"
        [isLoading]="false"
        (fileSelected)="onFileSelected($event)"
        (fileCreated)="onFileCreated($event)"
        (fileDeleted)="onFileDeleted($event)"
      ></app-project-file-list>

      <div class="sidebar-divider"></div>

      <app-project-chat-session-list
        [sessions]="chatSessions"
        [activeSessionId]="selectedSessionId"
        [isLoading]="isLoadingSessions"
        [presets]="llmPresets"
        (sessionSelected)="onSessionSelected($event)"
        (sessionCreated)="onSessionCreated($event)"
        (sessionDeleted)="onSessionDeleted($event)"
      ></app-project-chat-session-list>
    </div>

    <!-- Right Panel -->
    <div class="main-panel">
      <app-project-file-editor
        *ngIf="activeView === 'file' && selectedFile"
        [file]="selectedFile"
        [categories]="getUniqueCategories()"
        (fileSaved)="onFileSaved($event)"
        (fileDeleted)="onFileDeleted($event)"
        (fileClosed)="onFileClosed()"
      ></app-project-file-editor>

      <app-project-chat
        *ngIf="activeView === 'chat' && selectedSession && project"
        [session]="selectedSession"
        [projectId]="project.id"
        (sessionUpdated)="onSessionUpdated($event)"
      ></app-project-chat>

      <div *ngIf="activeView === 'none'" class="empty-panel">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="empty-icon">
          <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
        <h3>Select a file or start a chat</h3>
        <p>Choose an item from the sidebar to get started</p>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div *ngIf="loading" class="loading-state">
  <div class="loading-content">
    <svg fill="none" class="spinner" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" stroke-width="4" stroke="currentColor" class="opacity-25"></circle>
      <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor" class="opacity-75"></path>
    </svg>
    <p>Loading project...</p>
  </div>
</div>

<!-- Error -->
<div *ngIf="error && !loading" class="error-state">
  <div class="error-content">
    <svg fill="none" stroke="currentColor" class="error-icon" viewBox="0 0 24 24">
      <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
    </svg>
    <div class="error-text">
      <h3>Error Loading Project</h3>
      <p>{{ error }}</p>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<app-delete-confirmation-modal
  (cancel)="cancelDeleteProject()"
  (confirm)="confirmDeleteProject()"
  [adventureName]="project?.name || ''"
  [isDeleting]="isDeleting"
  [isOpen]="showDeleteModal">
</app-delete-confirmation-modal>
